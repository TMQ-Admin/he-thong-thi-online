<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lumina Me - Admin</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f7f6; padding: 40px; }
        .box { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #007bff; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="box">
        <h2>DÀNH CHO GIÁO VIÊN</h2>
        <input type="text" id="title" placeholder="Tên bài (Vd: Bài 1: Tính Tổng)">
        <textarea id="desc" rows="4" placeholder="Mô tả đề bài..."></textarea>
        <textarea id="input" rows="2" placeholder="Dữ liệu đầu vào (Vd: 5 10)"></textarea>
        <textarea id="output" rows="2" placeholder="Kết quả đúng (Vd: 15)"></textarea>
        <button onclick="postProblem()">XUẤT BẢN BÀI THI</button>
    </div>

    <script>
        async function postProblem() {
            const btn = document.querySelector('button');
            btn.innerText = "Đang gửi..."; // Để Quân biết là nút đã được bấm

            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                testCaseInput: document.getElementById('input').value,
                testCaseOutput: document.getElementById('output').value
            };

            try {
                // THAY LINK NÀY BẰNG LINK RENDER THẬT CỦA QUÂN
                const response = await fetch('https://he-thong-thi-backend.onrender.com/add-problem', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const res = await response.json();
                alert(res.message);
                location.reload();
            } catch (err) {
                alert("Lỗi kết nối server rồi Quân ơi!");
            } finally {
                btn.innerText = "XUẤT BẢN BÀI THI";
            }
        }
    </script>
</body>
</html>

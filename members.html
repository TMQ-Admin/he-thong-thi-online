<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thành viên - Hệ thống thi Code</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; }

        /* Thanh Menu giống trang chủ */
        .navbar { background: #2c3e50; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: white; font-size: 1.5rem; font-weight: bold; text-decoration: none; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { color: #bdc3c7; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .nav-links a:hover { color: white; }

        .container { width: 90%; max-width: 1000px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 25px; color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; display: inline-block; padding-bottom: 10px; }
        
        .member-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .member-table th { background-color: #3498db; color: white; padding: 15px; text-align: left; }
        .member-table td { padding: 15px; border-bottom: 1px solid #eee; }
        .member-table tr:hover { background-color: #f9f9f9; }

        /* Nhãn phân loại */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-teacher { background: #e74c3c; color: white; }
        .badge-student { background: #2ecc71; color: white; }
        
        .rank-gold { color: #f1c40f; font-weight: bold; } /* Hạng Vàng */
        .rank-silver { color: #95a5a6; font-weight: bold; } /* Hạng Bạc */
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">CODE-TEST</a>
        <ul class="nav-links">
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="#">Danh sách bài</a></li>
            <li><a href="members.html">Thành viên</a></li>
        </ul>
    </nav>

    <div style="text-align: center;">
        <div class="container">
            <h2>DANH SÁCH THÀNH VIÊN</h2>
            <table class="member-table">
                <thead>
                    <tr>
                        <th>Hạng</th>
                        <th>Tên người dùng</th>
                        <th>Trường</th>
                        <th>Vai trò</th>
                        <th>Rating</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="rank-gold">1</td>
                        <td><strong>Minh Quân</strong></td>
                        <td>THCS Nguyễn Trãi</td>
                        <td><span class="badge badge-student">Học sinh</span></td>
                        <td>2500</td>
                    </tr>
                    <tr>
                        <td class="rank-silver">2</td>
                        <td>Thầy Nguyễn Văn A</td>
                        <td>THCS Nguyễn Trãi</td>
                        <td><span class="badge badge-teacher">Giáo viên</span></td>
                        <td>2450</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Lê Văn B</td>
                        <td>THCS Tân Kỳ</td>
                        <td><span class="badge badge-student">Học sinh</span></td>
                        <td>1800</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>

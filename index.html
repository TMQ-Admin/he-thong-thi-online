<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống thi Code</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background-color: #007bff; color: white; padding: 20px 0; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { background: white; width: 80%; max-width: 800px; margin: 30px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { margin-top: 0; color: #333; }
        .status { color: #28a745; font-weight: bold; }
        .btn-submit { background: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { background: #218838; }
        .exam-info { border-left: 5px solid #007bff; background: #e7f3ff; padding: 15px; text-align: left; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Hệ Thống Thi Code</h2>
    </div>
    <div class="container">
        <h1>Chào mừng đến với kỳ thi C++</h1>
        <div class="exam-info">
            <strong>Trạng thái:</strong> <span class="status">Đang diễn ra</span><br>
            <strong>Thời gian còn lại:</strong> 60 phút<br>
            <strong>Số lượng bài tập:</strong> 5 bài
        </div>
        <p>Vui lòng chuẩn bị code và nhấn nút bên dưới để nộp bài.</p>
        <button class="btn-submit" onclick="alert('Hệ thống đang kết nối với bộ chấm code...')">Nộp bài làm</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành viên - Lumina Me</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .form-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

<div class="form-box">
    <h2>ĐĂNG KÝ</h2>
    <input type="text" id="username" placeholder="Tên đăng nhập" required>
    <input type="email" id="email" placeholder="Email của bạn" required>
    <input type="text" id="school" placeholder="Trường học (Vd: THCS Nguyễn Trãi)" required>
    <select id="role">
        <option value="Học sinh">Học sinh</option>
        <option value="Giáo viên">Giáo viên</option>
    </select>
    <input type="password" id="pass" placeholder="Mật khẩu" required>
    <button onclick="handleRegister()">Gửi Đăng Ký</button>
</div>

<script>
    async function handleRegister() {
        const userData = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            school: document.getElementById('school').value,
            role: document.getElementById('role').value,
            pass: document.getElementById('pass').value
        };

        if(!userData.username || !userData.pass) {
            alert("Quân ơi, điền đủ thông tin đã nhé!");
            return;
        }

        try {
            // Nối thẳng đến link Render của Quân
            const response = await fetch('https://he-thong-thi-backend.onrender.com/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(userData)
            });

            const result = await response.json();
            alert(result.message);
            
            if(response.ok) {
                // Đăng ký xong thì chuyển về trang chủ (index.html)
                window.location.href = 'index.html';
            }
        } catch (error) {
            alert("Lỗi kết nối rồi! Quân kiểm tra xem Render đã chạy 'Live' chưa nhé.");
        }
    }
</script>

</body>
</html>

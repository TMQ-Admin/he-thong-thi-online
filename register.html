<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thành viên - Cô Lý Mãi Đỉnh</title>
    <style>
        :root { --primary-color: #e91e63; --hover-color: #c2185b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fff0f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(233, 30, 99, 0.2); width: 100%; max-width: 400px; border: 2px solid #f8bbd0; }
        h2 { text-align: center; color: #ad1457; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #f48fb1; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; transition: all 0.3s; }
        input:focus { border-color: var(--primary-color); box-shadow: 0 0 5px rgba(233, 30, 99, 0.3); }
        button { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: var(--hover-color); transform: translateY(-1px); }
        button:disabled { background-color: #f06292; cursor: not-allowed; }
        .footer-text { text-align: center; margin-top: 20px; font-size: 14px; color: #880e4f; font-weight: bold; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Đăng Ký Thành Viên</h2>
    
    <div class="form-group">
        <input type="text" id="username" placeholder="Tên đăng nhập" required>
    </div>
    
    <div class="form-group">
        <input type="email" id="email" placeholder="Email của bạn" required>
    </div>
    
    <div class="form-group">
        <input type="text" id="school" placeholder="Trường học (Vd: THCS Nguyễn Trãi)" required>
    </div>
    
    <div class="form-group">
        <select id="role">
            <option value="Học sinh">Học sinh</option>
            <option value="Giáo viên">Giáo viên</option>
        </select>
    </div>
    
    <div class="form-group">
        <input type="password" id="pass" placeholder="Mật khẩu" required>
    </div>
    
    <button onclick="registerUser()" id="btnRegister">XÁC NHẬN ĐĂNG KÝ</button>
    
    <p class="footer-text">Hệ thống học tập: 💖 CÔ LÝ MÃI ĐỈNH 💖</p>
</div>

<script>
    async function registerUser() {
        const btn = document.getElementById('btnRegister');
        
        const userData = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            school: document.getElementById('school').value,
            role: document.getElementById('role').value,
            pass: document.getElementById('pass').value
        };

        if (!userData.username || !userData.pass) {
            alert("Quân ơi, nhắc các bạn điền đủ thông tin nhé!");
            return;
        }

        btn.innerText = "Đang kết nối server...";
        btn.disabled = true;

        try {
            // Lưu ý: Link này phải khớp với App của bạn trên Render
            const response = await fetch('https://he-thong-thi-backend.onrender.com/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            const result = await response.json();

            if (response.ok) {
                alert("Đã lưu dữ liệu thành công! Chào mừng bạn đến với hệ thống của Cô Lý.");
                document.querySelectorAll('input').forEach(i => i.value = '');
            } else {
                alert("Lỗi server: " + (result.message || "Lỗi không xác định"));
            }
        } catch (error) {
            console.error("Lỗi:", error);
            alert("Server đang khởi động (mất khoảng 30s). Quân hãy đợi một lát rồi bấm lại nhé!");
        } finally {
            btn.innerText = "XÁC NHẬN ĐĂNG KÝ";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>

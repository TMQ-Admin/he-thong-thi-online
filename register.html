<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thành viên - Lumina Me</title>
    <style>
        :root { --primary-color: #007bff; --hover-color: #0056b3; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--primary-color); }
        button { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: var(--hover-color); }
        .footer-text { text-align: center; margin-top: 15px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Đăng Ký</h2>
    
    <div class="form-group">
        <input type="text" id="username" placeholder="Tên đăng nhập" required>
    </div>
    
    <div class="form-group">
        <input type="email" id="email" placeholder="Email (Vd: quan@gmail.com)" required>
    </div>
    
    <div class="form-group">
        <input type="text" id="school" placeholder="Trường học (Vd: THCS Nguyễn Trãi)" required>
    </div>
    
    <div class="form-group">
        <select id="role">
            <option value="Học sinh">Học sinh</option>
            <option value="Giáo viên">Giáo viên</option>
        </select>
    </div>
    
    <div class="form-group">
        <input type="password" id="pass" placeholder="Mật khẩu" required>
    </div>
    
    <button onclick="registerUser()" id="btnRegister">GỬI ĐĂNG KÝ</button>
    
    <p class="footer-text">Dự án hỗ trợ học tập <b>Lumina Me</b></p>
</div>

<script>
    async function registerUser() {
        const btn = document.getElementById('btnRegister');
        
        // Lấy dữ liệu từ form
        const userData = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            school: document.getElementById('school').value,
            role: document.getElementById('role').value,
            pass: document.getElementById('pass').value
        };

        // Kiểm tra xem Quân đã điền đủ chưa
        if (!userData.username || !userData.pass) {
            alert("Quân ơi, điền đủ thông tin đã nhé!");
            return;
        }

        btn.innerText = "Đang xử lý...";
        btn.disabled = true;

        try {
            // Gửi dữ liệu đến Render
            const response = await fetch('https://he-thong-thi-backend.onrender.com/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(userData)
            });

            const result = await response.json();

            if (response.ok) {
                alert("Thành công! Dữ liệu đã được lưu vào MongoDB.");
                // Xóa trắng form sau khi thành công
                document.querySelectorAll('input').forEach(i => i.value = '');
            } else {
                alert("Lỗi server: " + (result.message || "Không xác định"));
            }
        } catch (error) {
            console.error("Lỗi:", error);
            alert("Lỗi kết nối! Quân kiểm tra xem Render đã hiện chữ 'Live' màu xanh chưa nhé.");
        } finally {
            btn.innerText = "GỬI ĐĂNG KÝ";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
